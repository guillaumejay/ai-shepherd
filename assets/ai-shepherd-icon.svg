<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512" shape-rendering="crispEdges">
  <title>AI Shepherd</title>
  <desc>Pixel art icon: shepherd with sheep under a tree</desc>

  <defs>
    <style>
      .bg-sky    { fill: #8ec5e8 }
      .bg-sky2   { fill: #a8d4ec }
      .sun       { fill: #f9d342 }
      .sunh      { fill: #f7b733 }
      .hill      { fill: #5a9e5d }
      .hilld     { fill: #4a8c4f }
      .grass     { fill: #7fc47e }
      .grass2    { fill: #689b65 }
      .trunk     { fill: #6b4423 }
      .trunkd    { fill: #4a2e16 }
      .leaf      { fill: #3a8a3e }
      .leafd     { fill: #2a6b30 }
      .leafl     { fill: #5cb060 }
      .wool      { fill: #f0ece2 }
      .woold     { fill: #c8c0b0 }
      .face      { fill: #2b2018 }
      .skin      { fill: #e8b890 }
      .body      { fill: #4a6fa5 }
      .bodyd     { fill: #2f4d7a }
      .hat       { fill: #2c4660 }
      .staff     { fill: #8b5e3c }
      .eye       { fill: #1a1410 }
    </style>
    <clipPath id="rounded">
      <rect x="0" y="0" width="512" height="512" rx="96" ry="96"/>
    </clipPath>
  </defs>

  <g clip-path="url(#rounded)">
    <!-- Sky -->
    <rect x="0" y="0" width="512" height="512" class="bg-sky"/>
    <rect x="0" y="0" width="512" height="160" class="bg-sky2"/>

    <!-- Sun -->
    <rect x="384" y="48"  width="64" height="16" class="sun"/>
    <rect x="368" y="64"  width="96" height="16" class="sun"/>
    <rect x="368" y="80"  width="96" height="16" class="sun"/>
    <rect x="384" y="96"  width="64" height="16" class="sun"/>
    <rect x="384" y="64"  width="16" height="16" class="sunh" opacity="0.5"/>
    <rect x="408" y="24"  width="16" height="16" class="sun"/>
    <rect x="408" y="120" width="16" height="16" class="sun"/>
    <rect x="336" y="72"  width="16" height="16" class="sun"/>

    <!-- Cloud -->
    <rect x="80"  y="80"  width="80"  height="16" class="wool"/>
    <rect x="64"  y="96"  width="112" height="16" class="wool"/>
    <rect x="80"  y="112" width="80"  height="16" class="wool"/>

    <!-- Hills -->
    <rect x="0"   y="320" width="512" height="16" class="hill"/>
    <rect x="320" y="304" width="192" height="16" class="hill"/>
    <rect x="0"   y="336" width="512" height="16" class="hilld"/>

    <!-- Ground -->
    <rect x="0" y="352" width="512" height="160" class="grass"/>
    <rect x="48"  y="384" width="16" height="16" class="grass2"/>
    <rect x="160" y="416" width="16" height="16" class="grass2"/>
    <rect x="304" y="400" width="16" height="16" class="grass2"/>
    <rect x="416" y="432" width="16" height="16" class="grass2"/>
    <rect x="80"  y="464" width="16" height="16" class="grass2"/>
    <rect x="240" y="480" width="16" height="16" class="grass2"/>
    <rect x="400" y="480" width="16" height="16" class="grass2"/>

    <!-- Tree foliage -->
    <rect x="64"  y="160" width="48"  height="16" class="leaf"/>
    <rect x="48"  y="176" width="96"  height="16" class="leaf"/>
    <rect x="64"  y="176" width="32"  height="16" class="leafl"/>
    <rect x="32"  y="192" width="128" height="16" class="leaf"/>
    <rect x="48"  y="192" width="48"  height="16" class="leafl"/>
    <rect x="128" y="192" width="32"  height="16" class="leafd"/>
    <rect x="32"  y="208" width="128" height="16" class="leaf"/>
    <rect x="48"  y="208" width="32"  height="16" class="leafl"/>
    <rect x="128" y="208" width="32"  height="16" class="leafd"/>
    <rect x="48"  y="224" width="96"  height="16" class="leaf"/>
    <rect x="112" y="224" width="32"  height="16" class="leafd"/>
    <rect x="64"  y="240" width="64"  height="16" class="leaf"/>

    <!-- Tree trunk -->
    <rect x="80"  y="256" width="32"  height="96" class="trunk"/>
    <rect x="80"  y="256" width="16"  height="96" class="trunkd"/>

    <!-- Shepherd: hat -->
    <rect x="240" y="176" width="48"  height="16" class="hat"/>
    <rect x="224" y="192" width="80"  height="16" class="hat"/>
    <rect x="240" y="192" width="48"  height="16" class="bodyd"/>

    <!-- Shepherd: head -->
    <rect x="240" y="208" width="48"  height="32" class="skin"/>
    <rect x="248" y="220" width="6"   height="6"  class="eye"/>
    <rect x="274" y="220" width="6"   height="6"  class="eye"/>

    <!-- Shepherd: body -->
    <rect x="232" y="240" width="64"  height="64" class="body"/>
    <rect x="232" y="240" width="16"  height="64" class="bodyd"/>
    <rect x="280" y="240" width="16"  height="64" class="bodyd"/>
    <rect x="232" y="272" width="64"  height="8"  class="bodyd"/>

    <!-- Shepherd: arm with staff -->
    <rect x="296" y="248" width="16"  height="32" class="body"/>
    <rect x="296" y="280" width="16"  height="16" class="skin"/>

    <!-- Shepherd: legs -->
    <rect x="240" y="304" width="16"  height="48" class="hat"/>
    <rect x="272" y="304" width="16"  height="48" class="hat"/>

    <!-- Staff (crook) -->
    <rect x="312" y="128" width="8"   height="160" class="staff"/>
    <rect x="320" y="128" width="16"  height="8"   class="staff"/>
    <rect x="336" y="128" width="8"   height="16"  class="staff"/>
    <rect x="320" y="144" width="16"  height="8"   class="staff"/>

    <!-- Sheep 1 (foreground right) -->
    <g transform="translate(360, 360)">
      <rect x="0"  y="0"   width="80" height="40" class="wool"/>
      <rect x="0"  y="-12" width="16" height="12" class="wool"/>
      <rect x="16" y="-20" width="16" height="20" class="wool"/>
      <rect x="32" y="-12" width="16" height="12" class="wool"/>
      <rect x="48" y="-20" width="16" height="20" class="wool"/>
      <rect x="64" y="-12" width="16" height="12" class="wool"/>
      <rect x="0"  y="32"  width="80" height="8"  class="woold"/>
      <rect x="80" y="0"   width="16" height="24" class="face"/>
      <rect x="80" y="-4"  width="8"  height="4"  class="face"/>
      <rect x="84" y="8"   width="4"  height="4"  class="wool"/>
      <rect x="8"  y="40"  width="10" height="20" class="face"/>
      <rect x="58" y="40"  width="10" height="20" class="face"/>
    </g>

    <!-- Sheep 2 (smaller, behind shepherd) -->
    <g transform="translate(120, 376)">
      <rect x="0"  y="0"   width="56" height="28" class="wool"/>
      <rect x="0"  y="-10" width="14" height="10" class="wool"/>
      <rect x="14" y="-16" width="14" height="16" class="wool"/>
      <rect x="28" y="-10" width="14" height="10" class="wool"/>
      <rect x="42" y="-16" width="14" height="16" class="wool"/>
      <rect x="0"  y="22"  width="56" height="6"  class="woold"/>
      <rect x="56" y="0"   width="12" height="16" class="face"/>
      <rect x="60" y="6"   width="3"  height="3"  class="wool"/>
      <rect x="6"  y="28"  width="8"  height="14" class="face"/>
      <rect x="42" y="28"  width="8"  height="14" class="face"/>
    </g>
  </g>
</svg>
